<svg width="420" height="600" viewBox="0 0 420 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="ccard"><rect width="420" height="600" rx="20"/></clipPath>
    <clipPath id="hexclip"><path d="M210 88 L268 121.5 268 188.5 210 222 152 188.5 152 121.5Z"/></clipPath>
    <linearGradient id="cedge" x1="0" y1="0" x2="420" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#39FFB6"/><stop offset=".35" stop-color="#F6C453"/>
      <stop offset=".65" stop-color="#FF4D8D"/><stop offset="1" stop-color="#7C5CFC"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39FFB6" stop-opacity="0"/>
      <stop offset=".35" stop-color="#7C5CFC" stop-opacity=".16"/>
      <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".22"/>
      <stop offset=".65" stop-color="#FF4D8D" stop-opacity=".16"/>
      <stop offset="1" stop-color="#F6C453" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sbar1" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0E7A5C"/><stop offset="1" stop-color="#39FFB6"/></linearGradient>
    <linearGradient id="sbar2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3A2E8C"/><stop offset="1" stop-color="#7C5CFC"/></linearGradient>
    <linearGradient id="sbar3" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6B2447"/><stop offset="1" stop-color="#FF4D8D"/></linearGradient>
    <linearGradient id="sbar4" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8C6A1D"/><stop offset="1" stop-color="#F6C453"/></linearGradient>
    <radialGradient id="chalo" cx=".5" cy=".28" r=".6">
      <stop offset="0" stop-color="#7C5CFC" stop-opacity=".28"/><stop offset="1" stop-color="#7C5CFC" stop-opacity="0"/>
    </radialGradient>
    <filter id="cglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .mono { font-family: 'JetBrains Mono','SFMono-Regular',Consolas,monospace; }
    .cn { font-family: 'Microsoft YaHei','PingFang SC',sans-serif; }
    .foilswipe { animation: foilswipe 4.2s ease-in-out infinite; }
    .crunner { stroke-dasharray: 220 1798; animation: crunner 6s linear infinite; }
    .avatarscan { animation: avatarscan 3.2s linear infinite; }
    .ssr { animation: ssrpulse 2.2s ease-in-out infinite; }
    .sp1 { animation: twinkle 2.8s ease-in-out infinite; transform-origin: 58px 64px; }
    .sp2 { animation: twinkle 2.8s .9s ease-in-out infinite; transform-origin: 352px 210px; }
    .sp3 { animation: twinkle 2.8s 1.7s ease-in-out infinite; transform-origin: 76px 476px; }
    .sp4 { animation: twinkle 2.8s .4s ease-in-out infinite; transform-origin: 344px 540px; }
    .st1 { animation: grow 1.4s .2s cubic-bezier(.2,.8,.2,1) both; transform-origin: 130px 0; }
    .st2 { animation: grow 1.4s .45s cubic-bezier(.2,.8,.2,1) both; transform-origin: 130px 0; }
    .st3 { animation: grow 1.4s .7s cubic-bezier(.2,.8,.2,1) both; transform-origin: 130px 0; }
    .st4 { animation: grow 1.4s .95s cubic-bezier(.2,.8,.2,1) both; transform-origin: 130px 0; }
    .cblink { animation: cblink 1.1s steps(1) infinite; }
    .ringspin { animation: ringspin 14s linear infinite; transform-origin: 210px 155px; }
    @keyframes foilswipe { 0% { transform: translate(-420px,-160px); } 55%,100% { transform: translate(420px,160px); } }
    @keyframes crunner { to { stroke-dashoffset: -2018; } }
    @keyframes avatarscan { from { transform: translateY(-80px); } to { transform: translateY(160px); } }
    @keyframes ssrpulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
    @keyframes twinkle { 0%,100% { opacity: .15; transform: scale(.55); } 50% { opacity: 1; transform: scale(1.15); } }
    @keyframes grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes cblink { 50% { opacity: 0; } }
    @keyframes ringspin { to { transform: rotate(360deg); } }
  </style>

  <g clip-path="url(#ccard)">
    <rect width="420" height="600" fill="#05070D"/>
    <rect width="420" height="600" fill="url(#chalo)"/>
    <g opacity=".08" stroke="#7C5CFC">
      <path d="M0 60H420M0 120H420M0 180H420M0 240H420M0 300H420M0 360H420M0 420H420M0 480H420M0 540H420M60 0V600M120 0V600M180 0V600M240 0V600M300 0V600M360 0V600"/>
    </g>

    <!-- header -->
    <text x="26" y="40" class="mono" font-size="12" fill="#667085" letter-spacing="2">OPERATOR CARD</text>
    <g class="ssr" filter="url(#cglow)">
      <text x="394" y="42" text-anchor="end" class="mono" font-size="18" font-weight="700" fill="#F6C453">SSR ★</text>
    </g>
    <path d="M26 52 H394" stroke="#242B3A"/>

    <!-- avatar hex -->
    <g class="ringspin">
      <circle cx="210" cy="155" r="86" stroke="#39FFB6" stroke-opacity=".35" stroke-width="1.5" stroke-dasharray="20 14"/>
    </g>
    <path d="M210 84 L272 119.5 272 190.5 210 226 148 190.5 148 119.5Z" stroke="url(#cedge)" stroke-width="3" filter="url(#cglow)"/>
    <g clip-path="url(#hexclip)">
      <image href="data:image/jpeg;base64," x="140" y="84" width="140" height="140" preserveAspectRatio="xMidYMid slice"/>
      <rect class="avatarscan" x="140" y="84" width="140" height="16" fill="#39FFB6" opacity=".22"/>
    </g>
    <circle cx="272" cy="190" r="6" fill="#39FFB6" filter="url(#cglow)"/>
    <circle cx="272" cy="190" r="6" stroke="#05070D" stroke-width="1.5"/>

    <!-- name -->
    <g filter="url(#cglow)">
      <text x="210" y="272" text-anchor="middle" class="mono" font-size="34" font-weight="700" fill="#F4F7FB">zyaoii_</text>
    </g>
    <rect class="cblink" x="286" y="248" width="4" height="26" fill="#39FFB6"/>
    <text x="210" y="298" text-anchor="middle" class="mono" font-size="12" fill="#AAB4C3">AI ENGINEER <tspan fill="#667085">×</tspan> <tspan fill="#FF4D8D">GAME QA</tspan></text>
    <text x="210" y="320" text-anchor="middle" class="mono" font-size="11" fill="#667085">📍 GUANGZHOU · CN &#160;|&#160; EST. 2019</text>

    <!-- stats -->
    <path d="M26 340 H394" stroke="#242B3A"/>
    <text x="26" y="368" class="mono" font-size="13" fill="#94A3B8">INSIGHT</text>
    <rect x="130" y="356" width="216" height="12" rx="6" fill="#0D1420"/>
    <g class="st1"><rect x="130" y="356" width="199" height="12" rx="6" fill="url(#sbar1)"/></g>
    <text x="394" y="367" text-anchor="end" class="mono" font-size="13" font-weight="700" fill="#39FFB6">92</text>

    <text x="26" y="400" class="mono" font-size="13" fill="#94A3B8">AUTOMATION</text>
    <rect x="130" y="388" width="216" height="12" rx="6" fill="#0D1420"/>
    <g class="st2"><rect x="130" y="388" width="190" height="12" rx="6" fill="url(#sbar2)"/></g>
    <text x="394" y="399" text-anchor="end" class="mono" font-size="13" font-weight="700" fill="#7C5CFC">88</text>

    <text x="26" y="432" class="mono" font-size="13" fill="#94A3B8">RIGOR</text>
    <rect x="130" y="420" width="216" height="12" rx="6" fill="#0D1420"/>
    <g class="st3"><rect x="130" y="420" width="205" height="12" rx="6" fill="url(#sbar3)"/></g>
    <text x="394" y="431" text-anchor="end" class="mono" font-size="13" font-weight="700" fill="#FF4D8D">95</text>

    <text x="26" y="464" class="mono" font-size="13" fill="#94A3B8">CURIOSITY</text>
    <rect x="130" y="452" width="216" height="12" rx="6" fill="#0D1420"/>
    <g class="st4"><rect x="130" y="452" width="214" height="12" rx="6" fill="url(#sbar4)"/></g>
    <text x="394" y="463" text-anchor="end" class="mono" font-size="13" font-weight="700" fill="#F6C453">99</text>

    <!-- skill chips -->
    <g class="mono" font-size="11">
      <rect x="40" y="486" width="100" height="26" rx="13" stroke="#39FFB6" stroke-opacity=".6"/>
      <text x="90" y="503" text-anchor="middle" fill="#39FFB6">AI AGENTS</text>
      <rect x="152" y="486" width="106" height="26" rx="13" stroke="#7C5CFC" stroke-opacity=".7"/>
      <text x="205" y="503" text-anchor="middle" fill="#9F86FF">RISK RADAR</text>
      <rect x="270" y="486" width="108" height="26" rx="13" stroke="#FF4D8D" stroke-opacity=".6"/>
      <text x="324" y="503" text-anchor="middle" fill="#FF4D8D">EDGE CASES</text>
    </g>

    <!-- footer -->
    <path d="M26 532 H394" stroke="#242B3A"/>
    <text x="26" y="560" class="cn" font-size="12" fill="#AAB4C3">路虽远，行则将至。</text>
    <g stroke="#39FFB6" stroke-opacity=".7">
      <path d="M300 548V566M306 548V566M310 548V566M318 548V566M322 548V566M330 548V566M338 548V566M342 548V566M350 548V566M356 548V566M360 548V566M368 548V566M374 548V566M380 548V566" stroke-width="2"/>
    </g>
    <text x="394" y="582" text-anchor="end" class="mono" font-size="9" fill="#667085">NO.0001 // FIRST EDITION</text>

    <!-- sparkles -->
    <g fill="#FFFFFF" filter="url(#cglow)">
      <path class="sp1" d="M58 56 L60.5 61.5 66 64 60.5 66.5 58 72 55.5 66.5 50 64 55.5 61.5Z"/>
      <path class="sp2" d="M352 202 L354.5 207.5 360 210 354.5 212.5 352 218 349.5 212.5 344 210 349.5 207.5Z" fill="#F6C453"/>
      <path class="sp3" d="M76 468 L78.5 473.5 84 476 78.5 478.5 76 484 73.5 478.5 68 476 73.5 473.5Z" fill="#39FFB6"/>
      <path class="sp4" d="M344 532 L346.5 537.5 352 540 346.5 542.5 344 548 341.5 542.5 336 540 341.5 537.5Z" fill="#FF4D8D"/>
    </g>

    <!-- holo foil sweep -->
    <g class="foilswipe">
      <rect x="-120" y="-200" width="360" height="1000" transform="rotate(24)" fill="url(#foil)"/>
    </g>
  </g>

  <!-- border -->
  <rect x="1.5" y="1.5" width="417" height="597" rx="19" stroke="url(#cedge)" stroke-width="2.5" opacity=".55"/>
  <rect class="crunner" x="1.5" y="1.5" width="417" height="597" rx="19" stroke="#FFFFFF" stroke-width="2" filter="url(#cglow)" opacity=".8"/>
</svg>
