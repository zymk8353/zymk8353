<svg width="1000" height="340" viewBox="0 0 1000 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .mono { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; }
    .scan { animation: scan 5s linear infinite; }
    .blink { animation: blink 1s steps(1) infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
    .flow { stroke-dasharray: 7 13; animation: flow 2s linear infinite; }
    .fade1 { animation: fade 4s ease-in-out infinite; }
    .fade2 { animation: fade 4s 1.3s ease-in-out infinite; }
    .fade3 { animation: fade 4s 2.6s ease-in-out infinite; }
    @keyframes scan { from { transform: translateY(-40px); } to { transform: translateY(380px); } }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes pulse { 50% { opacity: .35; transform: scale(.82); } }
    @keyframes flow { to { stroke-dashoffset: -40; } }
    @keyframes fade { 0%, 100% { opacity: .28; } 45% { opacity: 1; } }
  </style>

  <rect width="1000" height="340" rx="12" fill="#080B12"/>
