<svg width="1000" height="140" viewBox="0 0 1000 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="fcard"><rect width="1000" height="140" rx="14"/></clipPath>
    <linearGradient id="w1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39FFB6" stop-opacity=".28"/>
      <stop offset=".5" stop-color="#7C5CFC" stop-opacity=".3"/>
      <stop offset="1" stop-color="#FF4D8D" stop-opacity=".28"/>
    </linearGradient>
    <linearGradient id="w2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C5CFC" stop-opacity=".22"/>
      <stop offset="1" stop-color="#39FFB6" stop-opacity=".22"/>
    </linearGradient>
    <filter id="fglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .mono { font-family: 'JetBrains Mono','SFMono-Regular',Consolas,monospace; }
    .wa { animation: drift 9s linear infinite; }
    .wb { animation: drift 13s linear infinite reverse; }
    .tw { animation: glowpulse 3.2s ease-in-out infinite; }
    @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-500px); } }
    @keyframes glowpulse { 0%,100% { opacity: .75; } 50% { opacity: 1; } }
  </style>
  <g clip-path="url(#fcard)">
    <rect width="1000" height="140" fill="#05070D"/>
    <g class="wa">
      <path d="M0 92 Q62 62 125 92 T250 92 T375 92 T500 92 T625 92 T750 92 T875 92 T1000 92 T1125 92 T1250 92 T1375 92 T1500 92 V140 H0 Z" fill="url(#w1)"/>
    </g>
    <g class="wb">
      <path d="M-500 104 Q-437 82 -375 104 T-250 104 T-125 104 T0 104 T125 104 T250 104 T375 104 T500 104 T625 104 T750 104 T875 104 T1000 104 V140 H-500 Z" fill="url(#w2)"/>
    </g>
    <text x="500" y="52" text-anchor="middle" class="mono tw" font-size="16" font-weight="700" fill="#39FFB6" filter="url(#fglow)" letter-spacing="6">SIGNAL OVER NOISE</text>
    <text x="500" y="76" text-anchor="middle" class="mono" font-size="11" fill="#667085">// end of transmission — thanks for scrolling</text>
  </g>
  <rect x="1" y="1" width="998" height="138" rx="13" stroke="#242B3A" stroke-width="2"/>
</svg>
